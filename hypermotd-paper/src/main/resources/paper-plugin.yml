name: hyperMOTD
main: lol.hyper.hypermotd.MOTDPaper
version: ${version}
author: hyperdefined
folia-supported: true
api-version: '26.1.1'
website: https://github.com/hyperdefined/hyperMOTD

loader: lol.hyper.hypermotd.MOTDPaperLoader

commands:
  hypermotd:
    usage: /hypermotd
    description: Reload the config.
permissions:
